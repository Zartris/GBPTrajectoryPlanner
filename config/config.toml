# GBP Trajectory Planner — System Configuration
# All values shown are defaults. Remove or comment out lines to use defaults.

[gbp]
msg_damping      = 0.5
internal_iters   = 3
external_iters   = 5
timestep         = 0.1
init_variance    = 100.0
anchor_precision = 1000.0

[gbp.dynamics]
sigma = 0.5

[gbp.interrobot]
d_safe           = 1.3
sigma            = 0.12
activation_range = 3.0
decay_alpha      = 3.0
front_damping    = 0.3

[gbp.velocity_bound]
v_min         = -0.3
v_max_default = 2.5
kappa         = 10.0
margin        = 1.0
max_precision = 100.0

[robot]
max_accel = 2.5
max_jerk  = 5.0
max_speed = 2.5
v_min     = -0.3
