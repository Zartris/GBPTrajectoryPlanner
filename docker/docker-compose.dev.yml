services:
  gbptrajectoryplanner:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        USERNAME: ${USER}
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
        RENDER_GID: ${RENDER_GID:-992}
    image: gbptrajectoryplanner
    container_name: gbptrajectoryplanner-sandbox
    volumes:
      # Mount project files — changes sync both ways
      - ..:/repo
      # Mount repo-level (local/project) configs
      - ../.claude:/repo/.claude
      - ../.github:/repo/.github
      - ../.opencode:/repo/.opencode
      - ../.vscode:/repo/.vscode
      # Mount global-level (user) configs
      - ${HOME}/.claude:/home/${USER}/.claude
      - ${HOME}/.copilot:/home/${USER}/.copilot
      - ${HOME}/.github:/home/${USER}/.github
      - ${HOME}/.opencode:/home/${USER}/.opencode
      - ${HOME}/.config/opencode:/home/${USER}/.config/opencode
      - ${HOME}/.vscode:/home/${USER}/.vscode
      - ${HOME}/.ssh:/home/${USER}/.ssh:ro
      - ${HOME}/.gitconfig:/home/${USER}/.gitconfig:ro
      # gh CLI auth — auth once on host with `gh auth login`, persists across rebuilds
      - ${HOME}/.config/gh:/home/${USER}/.config/gh
      # WSL2 GPU stack — exposes d3d12/dxcore/drivers so dzn Vulkan driver works
      - /usr/lib/wsl:/usr/lib/wsl:ro
      # DRI render nodes for Mesa/DRM GPU path (AMD/Intel/llvmpipe fallback)
      - /dev/dri:/dev/dri
      # WSL2 GPU virtualisation device — required for d3d12/Vulkan via dxg
      - /dev/dxg:/dev/dxg
      # X11 forwarding — lets Bevy/visualiser open a window on the host display
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Wayland socket — WSLg exposes this; faster than X11 forwarding
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/wayland-0:/tmp/runtime-${UID:-1000}/wayland-0:rw
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=wayland-0
      - XDG_RUNTIME_DIR=/tmp/runtime-${UID:-1000}
      # NVIDIA GPU passthrough (requires nvidia-container-toolkit on host)
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # WSL2 GPU libs must be on the linker path so wgpu/Vulkan finds libdxcore etc.
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      # WSL2 GPU via dzn (D3D12-over-Vulkan) is available but currently slower
      # than llvmpipe for this visualiser due to translation overhead.
      # To try GPU: set WGPU_ADAPTER_NAME=NVIDIA (also needs the 3 lines below).
      #- GALLIUM_DRIVER=d3d12
      #- MESA_D3D12_DEFAULT_ADAPTER_NAME=NVIDIA
      #- WGPU_ALLOW_UNDERLYING_NONCOMPLIANT_ADAPTER=1
      #- VK_LOADER_LAYERS_DISABLE=*validation*
      # Use CPU renderer — faster than dzn for lightweight visualiser workloads
      - WGPU_ADAPTER_NAME=llvmpipe
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, compute, utility, display]
    stdin_open: true
    tty: true
    working_dir: /repo
