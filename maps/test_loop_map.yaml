# ============================================================================
# FIDUCIALS DOCUMENTATION
# ============================================================================
# FIDUCIALS: (array of objects) Physical markers for localization
# Each fiducial contains:
#   id: (string) Unique identifier
#   type: (string) Marker technology: "magnetic_marker" | "apriltag" | "qr" | etc.
#   pose: (object) Physical location and orientation
#     position: (array) 3D coordinates [x, y, z]
#     yaw: (number) Orientation in radians
#   association: (object) Link to map topology
#     edge_id: (string) Associated edge ID
#     s: (number) Distance along edge from source node [meters]
#     # OR alternatively:
#     nearest_node: (string) Associated node ID
#   tags: (object) Fiducial-specific metadata
#
# Common Fiducial Tags:
#   role: "localization" | "charger_marker" - Purpose/function
#
# NOTE: The 's' parameter represents arc-length distance (in meters) from
# the source node of the associated edge to the fiducial's location.
# ============================================================================
