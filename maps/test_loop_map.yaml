# ============================================================================
# EDGES DOCUMENTATION
# ============================================================================
# EDGES: (array of objects) Connections between nodes with motion constraints
# Each edge contains:
#   id: (string) Unique identifier
#   source: (string) Starting node ID
#   target: (string) Ending node ID
#   direction: (string) "left" | "right" | ""
#   directionality: (string) "bidirectional" | "forward_only"
#   geometry: (object) Path shape definition
#     type: (string) "line" | "arc" | "spline" | "polyline"
#     # For type="line":
#     points: (array) Two 3D points [[x1,y1,z1], [x2,y2,z2]]
#     length: (number) Optional explicit length in meters
#     length_computed: (boolean) Whether length was computed vs. user-specified
#     # For type="spline":
#     representation: (string) "nurbs" | "cubic_bspline" | "catmull_rom" | "bezier"
#     frame: (string) Coordinate frame, typically "map"
#     control_points: (array) Control points defining spline shape
#     degree: (number) Polynomial degree for NURBS (e.g., 3 for cubic)
#     knots: (array) Knot vector for NURBS (length = n_control_points + degree + 1)
#     weights: (array) Weights for rational curves (length = n_control_points)
#     length_estimate: (number) Approximate arc length in meters
#     parameterization: (string) "uniform" | "chord" | "centripetal"
#   speed_profile: (object) Motion constraints
#     max: (number) Maximum allowed speed [m/s]
#     nominal: (number) Target/preferred speed [m/s]
#     accel_limit: (number) Maximum acceleration [m/s²]
#     decel_limit: (number) Maximum deceleration [m/s²]
#   safety: (object) Safety parameters
#     clearance: (number) Required separation from obstacles [meters]
#   tags: (object) Edge-specific metadata
#
# Common Edge Tags:
#   role: "charging" | "driving" | "checkup" - Primary function
#   surface: "flat" | "ramp" - Physical surface characteristics
